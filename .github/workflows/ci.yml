name: CypressAPI

on:
  push:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes Cypress
        uses: cypress-io/github-action@v6
        with:
          runTests: true

      - name: Publicar relatório HTML dos testes
        if: always() # publica o relatório mesmo quando algum teste falha
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: cypress/reports
          retention-days: 30

      - name: Publicar screenshots das falhas
        if: failure() # só há screenshots quando algum teste falha
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-falhas
          path: cypress/screenshots
          retention-days: 30

      - name: Publicar vídeos da execução
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-execucao
          path: cypress/videos
          if-no-files-found: ignore
          retention-days: 30